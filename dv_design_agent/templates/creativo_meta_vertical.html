<!DOCTYPE html>
<!--
TEMPLATE: Creativo Meta Vertical (1080x1920) para Stories y Reels

Formato vertical con 20% top y bottom libre de elementos críticos
(la UI de IG/FB tapa esas zonas).

Placeholders: mismos que creativo_meta.html
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Creativo Meta Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0033CC;
    --dark: #0A0A0A;
    --accent-primary: #C8FF00;
    --accent-secondary: #FF0080;
    --light: #F5F5F5;
    --gray: #9CA3AF;
    --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    padding: 20px;
    display: flex;
    justify-content: center;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .slide {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: var(--primary);
    color: var(--white);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 100px;
  }
  /* Zona segura: dejar al menos 384px top y 384px bottom libres
     de elementos críticos (20% de 1920px) */
  .top-zone {
    min-height: 384px;
    display: flex;
    align-items: flex-start;
  }
  .center-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .bottom-zone {
    min-height: 384px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .top-tag {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-primary);
  }
  .top-tag .line {
    display: inline-block;
    width: 70px;
    height: 4px;
    background: var(--accent-primary);
    margin-right: 14px;
    vertical-align: middle;
  }
  .headline {
    font-size: 140px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -5px;
  }
  .headline .hl { color: var(--accent-primary); }
  .headline .strike {
    position: relative;
    display: inline-block;
    opacity: 0.75;
  }
  .headline .strike::after {
    content: '';
    position: absolute;
    left: -15px; right: -15px;
    top: 52%;
    height: 16px;
    background: var(--accent-primary);
    transform: rotate(-2.5deg);
  }
  .subtext {
    font-size: 36px;
    font-weight: 600;
    line-height: 1.3;
    max-width: 850px;
    margin-top: 40px;
    opacity: 0.9;
  }
  .bottom-cta {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .cta-button {
    background: var(--accent-primary);
    color: var(--dark);
    padding: 38px 70px;
    font-size: 42px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: inline-flex;
    align-items: center;
    gap: 24px;
    align-self: flex-start;
    transform: rotate(-1.5deg);
  }
  .signature {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 1px;
  }
  .signature .tag {
    background: var(--dark);
    color: var(--white);
    padding: 6px 14px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: 10px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="slide">
  <div class="top-zone">
    <div class="top-tag"><span class="line"></span>{{TAG_TOP}}</div>
  </div>
  <div class="center-zone">
    <div class="headline">{{HEADLINE}}</div>
    <div class="subtext">{{SUBTEXT}}</div>
  </div>
  <div class="bottom-zone">
    <div class="bottom-cta">
      <div class="cta-button">{{CTA_TEXT}} →</div>
      <div class="signature">{{BRAND_NAME}}<span class="tag">{{BRAND_TAGLINE}}</span></div>
    </div>
  </div>
</div>

</body>
</html>
