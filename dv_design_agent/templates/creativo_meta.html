<!DOCTYPE html>
<!--
TEMPLATE: Creativo Meta Ads (1 slide cuadrado 1080x1080)

Estructura simple pensada para ser "scroll stopper" en feed:
- Top tag de sección
- Headline potente con palabra destacada
- CTA o dato final
- Logo del cliente

Placeholders:
- {{TAG_TOP}}: categoría o frase corta (ej: "PARA DUEÑOS DE AGENCIA")
- {{HEADLINE}}: 6-10 palabras máximo, la frase principal
- {{SUBTEXT}}: 1 línea de apoyo opcional
- {{CTA_TEXT}}: texto del botón
- {{BRAND_NAME}}, {{BRAND_TAGLINE}}: firma
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Creativo Meta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0033CC;
    --dark: #0A0A0A;
    --accent-primary: #C8FF00;
    --accent-secondary: #FF0080;
    --light: #F5F5F5;
    --gray: #9CA3AF;
    --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px;
    background: var(--primary);
    color: var(--white);
  }
  .top-tag {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-primary);
  }
  .top-tag .line {
    display: inline-block;
    width: 60px;
    height: 3px;
    background: var(--accent-primary);
    margin-right: 12px;
    vertical-align: middle;
  }
  .headline {
    font-size: 120px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -4px;
  }
  .headline .hl {
    color: var(--accent-primary);
  }
  .headline .strike {
    position: relative;
    display: inline-block;
    opacity: 0.75;
  }
  .headline .strike::after {
    content: '';
    position: absolute;
    left: -15px; right: -15px;
    top: 52%;
    height: 14px;
    background: var(--accent-primary);
    transform: rotate(-2.5deg);
  }
  .subtext {
    font-size: 30px;
    font-weight: 600;
    line-height: 1.3;
    max-width: 800px;
    margin-top: 30px;
    opacity: 0.9;
  }
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .cta-button {
    background: var(--accent-primary);
    color: var(--dark);
    padding: 32px 60px;
    font-size: 36px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: inline-flex;
    align-items: center;
    gap: 20px;
    transform: rotate(-1.5deg);
  }
  .signature {
    font-size: 22px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 1px;
  }
  .signature .tag {
    background: var(--dark);
    color: var(--white);
    padding: 4px 12px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="slide">
  <div>
    <div class="top-tag"><span class="line"></span>{{TAG_TOP}}</div>
  </div>
  <div>
    <div class="headline">{{HEADLINE}}</div>
    <div class="subtext">{{SUBTEXT}}</div>
  </div>
  <div class="bottom-row">
    <div class="cta-button">{{CTA_TEXT}} →</div>
    <div class="signature">{{BRAND_NAME}}<span class="tag">{{BRAND_TAGLINE}}</span></div>
  </div>
</div>

</body>
</html>
